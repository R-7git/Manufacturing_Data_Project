version: '3.8'

services:
  # --- 1. Background Data Factory ---
  data-producer:
    image: apache/airflow:2.7.2-python3.11
    container_name: mfg-data-producer
    volumes:
      - ../../:/opt/airflow/project
    user: root
    command: >
      bash -c "pip install faker && 
      while true; do 
        python3 /opt/airflow/project/scripts/setup/manufacturing_data_producer.py; 
        echo 'Generated new batch... sleeping 5 mins';
        sleep 300; 
      done"
    restart: always

  # --- 2. Airflow Orchestrator ---
  airflow:
    image: apache/airflow:2.7.2-python3.11
    container_name: airflow
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      TF_VAR_snowflake_account: "BKVGNQZ-UO15536"
      TF_VAR_snowflake_user: "ROSHAN"
      SNOWFLAKE_PASSWORD: "Rosh20090798395@"
      _PIP_ADDITIONAL_REQUIREMENTS: dbt-snowflake faker confluent-kafka minio apache-airflow-providers-slack
    ports:
      - "8080:8080"
    volumes:
      - ../../:/opt/airflow/project 
      - ../../orchestration/airflow/dags:/opt/airflow/dags 
    command: >
      bash -c "airflow db migrate && 
      airflow users create --username admin --password password123 --role Admin --email admin@example.com --firstname Admin --lastname User || true &&
      (airflow webserver & airflow scheduler)"

  # --- 3. Metabase (Classic BI - Drag & Drop) ---
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    restart: always

  # --- 4. Streamlit (Data Apps - Python Based) ---
  streamlit:
    image: python:3.11-slim
    container_name: streamlit_app
    working_dir: /app
    volumes:
      - ../../scripts/setup:/app
    ports:
      - "8501:8501"
    environment:
      SNOWFLAKE_ACCOUNT: "BKVGNQZ-UO15536"
      SNOWFLAKE_USER: "ROSHAN"
      SNOWFLAKE_PASSWORD: "Rosh20090798395@"
    command: >
      bash -c "pip install streamlit snowflake-connector-python pandas plotly && 
      streamlit run sensor_dashboard.py --server.port 8501 --server.address 0.0.0.0"

  # --- 5. Supporting Services (Postgres, Jenkins, MinIO, Kafka) ---
  postgres:
    image: postgres:13
    container_name: airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    user: root
    ports:
      - "8090:8080"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092'

volumes:
  minio_data:
  postgres_data:
  jenkins_data:
