services:
  # --- 1. Background Data Factory (Fixed user) ---
  data-producer:
    image: apache/airflow:2.7.2-python3.11
    container_name: mfg-data-producer
    volumes:
      - ../../:/opt/airflow/project
    user: "50000:0" # Changed from root to airflow user to fix your pip warning
    command: >
      bash -c "pip install faker && 
      while true; do 
        python3 /opt/airflow/project/scripts/setup/manufacturing_data_producer.py; 
        sleep 300; 
      done"
    restart: always

  # --- 2. Kafka Infrastructure (Restored to Zookeeper Mode) ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181' # <--- Fixed the missing requirement
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # --- 3. BI & Apps (Stay the same) ---
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    restart: always

  streamlit:
    image: python:3.11-slim
    container_name: streamlit_app
    working_dir: /app
    volumes:
      - ../../scripts/setup:/app
    ports:
      - "8501:8501"
    environment:
      SNOWFLAKE_ACCOUNT: "BKVGNQZ-UO15536"
      SNOWFLAKE_USER: "ROSHAN"
      SNOWFLAKE_PASSWORD: "Rosh20090798395@"
    command: >
      bash -c "pip install streamlit snowflake-connector-python pandas plotly && 
      streamlit run sensor_dashboard.py --server.port 8501 --server.address 0.0.0.0"

  # --- 4. Airflow (Stay the same) ---
  airflow:
    image: apache/airflow:2.7.2-python3.11
    container_name: airflow
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      SNOWFLAKE_PASSWORD: "Rosh20090798395@"
      _PIP_ADDITIONAL_REQUIREMENTS: dbt-snowflake faker confluent-kafka minio apache-airflow-providers-slack
    ports:
      - "8080:8080"
    volumes:
      - ../../:/opt/airflow/project 
      - ../../orchestration/airflow/dags:/opt/airflow/dags 
    command: >
      bash -c "airflow db migrate && 
      airflow users create --username admin --password password123 --role Admin --email admin@example.com --firstname Admin --lastname User || true &&
      (airflow webserver & airflow scheduler)"

  postgres:
    image: postgres:13
    container_name: airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    user: root
    ports:
      - "8090:8080"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
    command: server /data --console-address ":9001"

volumes:
  minio_data:
  postgres_data:
  jenkins_data:
