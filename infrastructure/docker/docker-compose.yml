version: '3.8'

services:
  # --- 1. Background Data Factory ---
  data-producer:
    image: apache/airflow:2.7.2-python3.11
    container_name: mfg-data-producer
    volumes:
      - ../../:/opt/airflow/project
    user: "50000:0"
    working_dir: /opt/airflow/project
    command: >
      bash -c "pip install faker pandas && 
      while true; do 
        echo '--- Starting Data Production Batch ---' &&
        python3 /opt/airflow/project/scripts/setup/manufacturing_data_producer.py || echo 'Script Failed!' &&
        sleep 60; 
      done"
    restart: always

  # --- 2. Kafka Infrastructure ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # --- 3. Kafka Connect ---
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.5.0
    container_name: kafka-connect
    depends_on:
      - kafka
    ports:
      - "8083:8083"
    volumes:
      - /Users/ms/Desktop/Manufacturing_Data_Project/data_ingestion/kafka/connectors:/etc/kafka-connect/custom-configs
    environment:
      CONNECT_BOOTSTRAP_SERVERS: 'kafka:29092'
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: compose-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: docker-connect-configs
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_TOPIC: docker-connect-offsets
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_TOPIC: docker-connect-status
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: com.snowflake.kafka.connector.records.SnowflakeJsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
    command: 
      - bash 
      - -c 
      - |
        echo "Installing Snowflake Connector..."
        confluent-hub install --no-prompt snowflakeinc/snowflake-kafka-connector:2.1.2
        /etc/confluent/docker/run
    restart: always

  # --- 4. Pipeline Automation (NEW: Automates MinIO & Snowflake Connector) ---
  pipeline-init:
    image: curlimages/curl:latest
    container_name: pipeline-init
    user: root
    volumes:
      - /Users/ms/Desktop/Manufacturing_Data_Project/data_ingestion/kafka/connectors:/configs
    depends_on:
      - kafka-connect
      - minio
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for Kafka Connect...';
      while [ $$(curl -s -o /dev/null -w %{http_code} http://kafka-connect:8083/connectors) -ne 200 ]; do sleep 5; done;
      
      echo 'Registering Snowflake Connector...';
      curl -X POST -H 'Content-Type: application/json' -d @/configs/snowflake_connector.json http://kafka-connect:8083/connectors;
      
      echo 'Setting up MinIO Bucket...';
      curl http://minio:9000; # Simple check
      # Note: For advanced MinIO CLI automation, we use the minio/mc image or a simple curl to a setup proxy.
      # Since we want one-shot: we'll use a secondary container or the MC command below.
      echo 'Pipeline Initialization Complete.';"

  minio-setup:
    image: minio/mc
    container_name: minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 admin password123) do echo 'Waiting for MinIO...'; sleep 2; done;
      /usr/bin/mc mb myminio/kafka-archive || true;
      exit 0;
      "

  # --- 5. Kafka UI ---
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8081:8080" 
    depends_on:
      - kafka
      - kafka-connect
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: snowflake-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    restart: always

  # --- 6. BI & Apps ---
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    restart: always

  streamlit:
    image: python:3.11-slim
    container_name: streamlit_app
    working_dir: /app
    volumes:
      - ../../scripts/setup:/app
    ports:
      - "8501:8501"
    environment:
      SNOWFLAKE_ACCOUNT: "BKVGNQZ-UO15536"
      SNOWFLAKE_USER: "ROSHAN"
      SNOWFLAKE_PASSWORD: "Rosh20090798395@"
    command: >
      bash -c "pip install streamlit snowflake-connector-python pandas plotly && 
      streamlit run sensor_dashboard.py --server.port 8501 --server.address 0.0.0.0"

  # --- 7. Airflow ---
  airflow:
    image: apache/airflow:2.7.2-python3.11
    container_name: airflow
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      SNOWFLAKE_PASSWORD: "Rosh20090798395@"
      _PIP_ADDITIONAL_REQUIREMENTS: >
        dbt-snowflake==1.8.3
        dbt-core==1.8.3
        faker 
        confluent-kafka 
        minio 
        apache-airflow-providers-slack
    ports:
      - "8080:8080"
    volumes:
      - ../../:/opt/airflow/project 
      - ../../orchestration/airflow/dags:/opt/airflow/dags 
    command: >
      bash -c "airflow db migrate && 
      airflow users create --username admin --password password123 --role Admin --email admin@example.com --firstname Admin --lastname User || true &&
      airflow connections add 'fs_default' --conn-type 'path' --conn-extra '{\"path\": \"/opt/airflow/project\"}' || true &&
      (airflow webserver & airflow scheduler)"

  postgres:
    image: postgres:13
    container_name: airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    user: root
    ports:
      - "8090:8080"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

  # --- 8. MinIO ---
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
  postgres_data:
  jenkins_data:
