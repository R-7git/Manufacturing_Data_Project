version: '3.8'

services:
  # 1. Metadata DB for Airflow
  postgres:
    image: postgres:13
    container_name: airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Airflow Orchestrator
  airflow:
    image: apache/airflow:2.7.2-python3.11
    container_name: airflow
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      
      # FIX: Enable Basic Auth so Jenkins can trigger the DAG via API
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
      
      # Snowflake Credentials
      TF_VAR_snowflake_account: "BKVGNQZ-UO15536"
      TF_VAR_snowflake_user: "ROSHAN"
      SNOWFLAKE_PASSWORD: "Rosh20090798395@"
      TF_VAR_snowflake_password: "Rosh20090798395@"
      
      # REQUIRED DBT ENV VARS
      SNOWFLAKE_DATABASE: "MFG_BRONZE_DB"
      SNOWFLAKE_SCHEMA: "KAFKA_INGEST"
      
      # Admin Setup
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: password123
      _PIP_ADDITIONAL_REQUIREMENTS: dbt-snowflake faker confluent-kafka
    ports:
      - "8080:8080"
    volumes:
      - ../../:/opt/airflow/project 
      - ../../orchestration/airflow/dags:/opt/airflow/dags 
      - ~/.dbt:/home/airflow/.dbt
    command: >
      bash -c "airflow db migrate && 
      airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password password123 || true &&
      (airflow webserver & airflow scheduler)"

  # 3. Jenkins
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    user: root
    group_add:
      - '0'
    ports:
      - "8090:8080"
      - "50000:50000"
    environment:
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker

  # 4. MinIO
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # 5. Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 6. Snowflake Kafka Connector
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.5.0
    container_name: kafka-connect
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: 'kafka:29092'
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: compose-connect-group
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_CONFIG_STORAGE_TOPIC: _connect-configs
      CONNECT_STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_OFFSET_STORAGE_TOPIC: _connect-offsets
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_REST_PORT: 8083
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
      SNOWFLAKE_PRIVATE_KEY_PATH: "/etc/kafka/secrets/rsa_key.p8"
    volumes:
      # Ensure this local path is correct for your RSA key
      - /Users/ms/Desktop/snowflake-manufacturing-data-platform/data_ingestion/kafka/connectors/rsa_key_clean.p8:/etc/kafka/secrets/rsa_key.p8:ro
    command:
      - /bin/bash
      - -c
      - |
        confluent-hub install --no-prompt snowflakeinc/snowflake-kafka-connector:2.1.2
        /etc/confluent/docker/run

volumes:
  minio_data:
  postgres_data:
  jenkins_data:
