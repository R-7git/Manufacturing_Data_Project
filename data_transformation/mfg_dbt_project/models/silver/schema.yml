version: 2

models:
  - name: silver_sensor_readings
    columns:
      - name: SENSOR_ID
        tests:
          - not_null
      - name: METRIC_VALUE
        tests:
          - not_null
          - accepted_values:
              values: ['TEMPERATURE', 'PRESSURE', 'VIBRATION', 'POWER CONSUMPTION']
      - name: INGESTION_TIMESTAMP
        tests:
          - not_null