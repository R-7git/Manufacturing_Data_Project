version: 2

models:
  - name: silver_sensor_readings
    description: "Standardized and cleaned sensor data."
    columns:
      - name: SENSOR_ID  # Changed to UPPERCASE
        tests:
          - not_null

      - name: METRIC_NAME # Changed to UPPERCASE
        tests:
          - not_null
          - accepted_values:
              values: ['TEMPERATURE', 'PRESSURE', 'VIBRATION', 'POWER CONSUMPTION']

      - name: METRIC_VALUE # Changed to UPPERCASE
        tests:
          - not_null

      - name: INGESTION_TIMESTAMP # Changed to UPPERCASE
        tests:
          - not_null

  - name: mfg_sensor_summary
    columns:
      - name: SENSOR_ID
        tests:
          - not_null
          - unique 
