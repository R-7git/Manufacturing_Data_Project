version: 2

models:
  - name: silver_sensor_readings
    columns:
      - name: SENSOR_ID
        data_tests:
          - not_null

      - name: METRIC_NAME
        data_tests:
          - not_null
          - accepted_values:
              # Nested 'values' key clears the dbt@0102 error
              values: ['TEMPERATURE', 'PRESSURE', 'VIBRATION', 'POWER CONSUMPTION']

      - name: METRIC_VALUE
        data_tests:
          - not_null

      - name: INGESTION_TIMESTAMP
        data_tests:
          - not_null
